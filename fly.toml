# OmokGosu on Fly.io
#
# Initial setup (one-time):
#   flyctl auth signup
#   flyctl launch --name omokgosu --region nrt --no-deploy --copy-config
#   flyctl volumes create omokgosu_data --region nrt --size 1
#   flyctl secrets set OMOK_JWT_SECRET="$(python -c 'import secrets;print(secrets.token_urlsafe(32))')"
#   flyctl deploy
#
# Subsequent deploys: flyctl deploy

app = "omokgosu"
primary_region = "nrt"  # Tokyo — closest Fly region to Korea

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

# Explicit process command: overrides the Dockerfile CMD and is recorded
# directly into the Fly machine spec, so subsequent deploys can't drift
# back to a stale CMD that was baked into a previous machine.
[processes]
  app = "uvicorn omok_server.main:app --host 0.0.0.0 --port 8080 --workers 1"

[[mounts]]
  source = "omokgosu_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    # 30s gives uvicorn + C++ pybind module enough time on cold start.
    # 10s used to be tight on shared-cpu-1x and contributed to deploy timeouts.
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512  # 256 is tight for the C++ pybind module + uvicorn workers
